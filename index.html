<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Shot Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 520px; margin: auto; }
    h1 { font-size: 22px; }
    label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
    input[type="number"], select {
      width: 100%; padding: 10px; margin: 4px 0 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;
    }
    button {
      width: 100%; padding: 12px; margin: 12px 0; font-size: 16px;
      background: #2a6; color: white; border: none; border-radius: 8px; cursor: pointer;
    }
    button:hover { background: #1d5; }
    .club-list {
      margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 8px;
      max-height: 250px; overflow-y: auto;
    }
    .club-list strong { display: block; margin-bottom: 6px; }
    .club-item {
      display: flex; align-items: baseline; padding: 4px 0;
    }
    .club-item input[type="checkbox"] {
      width: 18px; height: 18px; flex-shrink: 0; margin: 0; cursor: pointer;
      position: relative; top: 2px;
    }
    .club-item label {
      display: inline; margin-top: 0; font-weight: normal; font-size: 15px;
      padding-left: 8px; flex-shrink: 0; cursor: pointer; white-space: nowrap;
    }
    .club-dots {
      flex: 1;
      border-bottom: 1px dotted #bbb;
      margin: 0 6px;
      position: relative; top: -3px;
    }
    .carry-tag {
      font-size: 12px; color: #666; flex-shrink: 0; white-space: nowrap; text-align: right;
    }
    .roll-note { font-size: 12px; color: #888; font-weight: normal; }
    .result {
      margin-top: 20px; padding: 15px; background: #f2f2f2;
      border-radius: 8px; min-height: 40px; line-height: 1.7;
    }
    .error { color: #c00; }
    .plan-block { margin-bottom: 14px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
    .plan-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .tee-selector-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px; margin-top: 6px;
    }
    .tee-selector-row label {
      display: inline; margin: 0; font-weight: normal; font-size: 13px;
      color: #555; white-space: nowrap; flex-shrink: 0;
    }
    .tee-selector-row select {
      width: auto; padding: 3px 6px; font-size: 13px; margin: 0;
      border: 1px solid #bbb; border-radius: 4px; background: #fff; color: #333;
    }
    .forced-note { font-size: 12px; color: #888; font-style: italic; }
    .approach-line { margin-top: 2px; }
  </style>
</head>
<body>
  <h1>⛳ Golf Shot Planner</h1>

  <label for="holeLength">Hole Length (meters)</label>
  <input type="number" id="holeLength" placeholder="e.g. 380" min="50" max="600" />

  <label for="parSelect">Par</label>
  <select id="parSelect">
    <option value="3">Par 3</option>
    <option value="4" selected>Par 4</option>
    <option value="5">Par 5</option>
  </select>

  <label for="driverCarry">Driver Carry (m) *</label>
  <input type="number" id="driverCarry" placeholder="e.g. 230" min="100" max="350" />

  <label for="i7Carry">7 Iron Carry (m)</label>
  <input type="number" id="i7Carry" placeholder="e.g. 155 (optional)" min="80" max="220" />

  <label for="pwCarry">PW Carry (m)</label>
  <input type="number" id="pwCarry" placeholder="e.g. 120 (optional)" min="50" max="160" />

  <div class="club-list">
    <strong>Select Clubs in Bag:</strong>
    <div id="clubContainer"></div>
  </div>

  <label for="conditions">Fairway Conditions</label>
  <select id="conditions">
    <option value="soft">Soft / Wet — ball plugs, minimal roll</option>
    <option value="firm">Firm / Dry — ball runs out significantly</option>
  </select>

  <button id="calcButton">Calculate Shot Plan</button>
  <div class="result" id="output">Enter your details and press Calculate.</div>

<script>
const STORAGE_KEY = 'golfBag_v2';

// ── Club data ──────────────────────────────────────────────────────────────
// relCarry: carry as a fraction of driver carry, based on Trackman amateur averages.
// These are NON-UNIFORM — the gap from driver→FW3 is much larger than 8i→9i.
// This replaces the old "equal steps" assumption.
//
// Typical amateur gaps (carry only, ~230m driver baseline):
//   Driver 230 → FW3 215 → FW5 205 → FW7 195 → U2 190 → U3 185 → U4 180
//   → 4i 175 → 5i 168 → 6i 160 → 7i 152 → 8i 143 → 9i 133 → PW 122
//   → 50° 115 → 52° 110 → 54° 105 → 56° 100 → 58° 93 → 60° 87
//
// relCarry = club_carry / driver_carry, so interpolation scales correctly
// for any driver distance the user enters.
//
// Roll factors (soft vs firm):
//   Soft  — ball plugs on landing, minimal run. Closer to carry = total.
//   Firm  — summer conditions, ball lands and runs. Driver +15%, FWs +10%, etc.
//   Source: Trackman data, R&A distance reports, PGA/DP World Tour shot-tracking.
//
// Note: wedges always stop quickly regardless of conditions (steep descent angle,
// high spin), so both factors are 1.00–1.01 even on firm ground.

const clubs = [
  // key      label    relCarry  rollSoft  rollFirm  checked
  // rollFirm calibrated to Trackman/R&A amateur data on firm summer fairways.
  // Driver +15% (264m from 230 carry) sits mid-range for firm conditions.
  // FWs and irons revised upward from previous values which were 5-15m short.
  // Wedges unchanged — steep descent angle means minimal run regardless of conditions.
  {key:'driver', label:'Driver', relCarry:1.000, rollSoft:1.06, rollFirm:1.15, checked:true},
  {key:'fw3',    label:'FW3',    relCarry:0.935, rollSoft:1.06, rollFirm:1.13},
  {key:'fw5',    label:'FW5',    relCarry:0.891, rollSoft:1.05, rollFirm:1.12, checked:true},
  {key:'fw7',    label:'FW7',    relCarry:0.848, rollSoft:1.04, rollFirm:1.11},
  {key:'u2',     label:'U2',     relCarry:0.826, rollSoft:1.04, rollFirm:1.10},
  {key:'u3',     label:'U3',     relCarry:0.804, rollSoft:1.03, rollFirm:1.10},
  {key:'u4',     label:'U4',     relCarry:0.783, rollSoft:1.03, rollFirm:1.09, checked:true},
  {key:'4i',     label:'4i',     relCarry:0.761, rollSoft:1.03, rollFirm:1.09},
  {key:'5i',     label:'5i',     relCarry:0.730, rollSoft:1.02, rollFirm:1.08, checked:true},
  {key:'6i',     label:'6i',     relCarry:0.696, rollSoft:1.02, rollFirm:1.07, checked:true},
  {key:'7i',     label:'7i',     relCarry:0.661, rollSoft:1.01, rollFirm:1.06, checked:true},
  {key:'8i',     label:'8i',     relCarry:0.622, rollSoft:1.01, rollFirm:1.05, checked:true},
  {key:'9i',     label:'9i',     relCarry:0.578, rollSoft:1.00, rollFirm:1.04, checked:true},
  {key:'pw',     label:'PW',     relCarry:0.530, rollSoft:1.00, rollFirm:1.03, checked:true},
  {key:'50',     label:'50°',    relCarry:0.500, rollSoft:1.00, rollFirm:1.02},
  {key:'52',     label:'52°',    relCarry:0.478, rollSoft:1.00, rollFirm:1.02, checked:true},
  {key:'54',     label:'54°',    relCarry:0.457, rollSoft:1.00, rollFirm:1.00},
  {key:'56',     label:'56°',    relCarry:0.435, rollSoft:1.00, rollFirm:1.00, checked:true},
  {key:'58',     label:'58°',    relCarry:0.404, rollSoft:1.00, rollFirm:1.00},
  {key:'60',     label:'60°',    relCarry:0.378, rollSoft:1.00, rollFirm:1.00},
];

const clubOrder = clubs.map(c => c.key);
const idx7      = clubOrder.indexOf('7i');
const idxPW     = clubOrder.indexOf('pw');

// Build lookup maps from key → club object for fast access
const clubMap = clubs.reduce((acc, c) => { acc[c.key] = c; return acc; }, {});

// ── Conditions ─────────────────────────────────────────────────────────────
function getRollFactor(key) {
  const cond = document.getElementById('conditions').value;
  const c = clubMap[key];
  return cond === 'firm' ? c.rollFirm : c.rollSoft;
}

// ── Persistence ────────────────────────────────────────────────────────────
function saveBag() {
  const checked = clubs.map(c => document.getElementById('cb_' + c.key)?.checked ?? c.checked);
  const data = {
    checked,
    driver:     document.getElementById('driverCarry').value,
    i7:         document.getElementById('i7Carry').value,
    pw:         document.getElementById('pwCarry').value,
    conditions: document.getElementById('conditions').value,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadBag() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

// ── Interpolation (non-uniform spacing via relCarry) ───────────────────────
//
// Strategy: interpolate in "relCarry space" rather than index space.
// Each club has a relCarry (fraction of driver). When the user provides anchor
// distances (driver, 7i, PW), we compute a scale factor at each anchor and
// linearly blend between them in relCarry space. This respects the real-world
// non-uniform gaps between clubs.
//
// Example: user enters driver=230, 7i=155.
//   driver relCarry = 1.000 → actual = 230  → scale = 230/230 = 1.000
//   7i     relCarry = 0.661 → actual = 155  → scale = 155/(230×0.661) = 1.019
//   For a club between driver and 7i, we blend the scale linearly by relCarry.

function interpolate(driverDist, i7Dist, pwDist, key) {
  const c   = clubMap[key];
  const rel = c.relCarry;

  const driverRel = clubMap['driver'].relCarry; // 1.0
  const i7Rel     = clubMap['7i'].relCarry;     // 0.661
  const pwRel     = clubMap['pw'].relCarry;     // 0.530

  // Default (no anchors): pure relCarry scale from driver
  const rawCarry = driverDist * rel;

  if (!i7Dist && !pwDist) return rawCarry;

  // Build anchor list: always include driver, plus whichever the user provided
  const anchors = [{ rel: driverRel, actual: driverDist }];
  if (i7Dist) anchors.push({ rel: i7Rel, actual: i7Dist });
  if (pwDist) anchors.push({ rel: pwRel, actual: pwDist });
  anchors.sort((a, b) => b.rel - a.rel); // descending (driver first)

  // Find the two anchors that bracket this club's relCarry
  for (let i = 0; i < anchors.length - 1; i++) {
    const hi = anchors[i];
    const lo = anchors[i + 1];
    if (rel <= hi.rel && rel >= lo.rel) {
      const t = (hi.rel - rel) / (hi.rel - lo.rel); // 0 at hi, 1 at lo
      return hi.actual + t * (lo.actual - hi.actual);
    }
  }

  // Extrapolate beyond the lowest anchor (e.g. wedges when only driver+7i known)
  const lo = anchors[anchors.length - 1];
  const hi = anchors[anchors.length - 2];
  const slope = (lo.actual - hi.actual) / (lo.rel - hi.rel);
  return lo.actual + slope * (rel - lo.rel);
}

// ── Club list UI ───────────────────────────────────────────────────────────
function getCarryInputs() {
  return {
    driver: Number(document.getElementById('driverCarry').value) || 0,
    i7:     Number(document.getElementById('i7Carry').value)     || 0,
    pw:     Number(document.getElementById('pwCarry').value)     || 0,
  };
}

function updateCarryLabels() {
  const { driver, i7, pw } = getCarryInputs();
  clubs.forEach(c => {
    const span = document.getElementById('carry_' + c.key);
    if (!span) return;
    if (!driver) { span.textContent = ''; return; }
    const carry = interpolate(driver, i7, pw, c.key);
    const roll  = getRollFactor(c.key);
    const total = carry * roll;
    span.textContent = isFinite(carry) && carry > 0
      ? (roll > 1.00 ? `${carry.toFixed(0)}→${total.toFixed(0)}m` : `${carry.toFixed(0)}m`)
      : '';
  });
}

function buildClubUI(saved) {
  const container = document.getElementById('clubContainer');
  clubs.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'club-item';

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = c.key;
    cb.id = 'cb_' + c.key;
    cb.checked = saved ? (saved.checked[i] ?? !!c.checked) : !!c.checked;
    cb.addEventListener('change', saveBag);

    const lbl = document.createElement('label');
    lbl.htmlFor = 'cb_' + c.key;
    lbl.textContent = c.label;

    const dots = document.createElement('span');
    dots.className = 'club-dots';

    const carrySpan = document.createElement('span');
    carrySpan.id = 'carry_' + c.key;
    carrySpan.className = 'carry-tag';

    div.appendChild(cb);
    div.appendChild(lbl);
    div.appendChild(dots);
    div.appendChild(carrySpan);
    container.appendChild(div);
  });
}

// ── Club selection for planning ────────────────────────────────────────────
function getClubs(driver, i7, pw) {
  return [...document.querySelectorAll('#clubContainer input:checked')]
    .map(cb => {
      const key = cb.value;
      if (!(key in clubMap)) return null;
      const carry = interpolate(driver, i7, pw, key);
      if (!isFinite(carry) || carry <= 0) return null;
      const roll  = getRollFactor(key);
      return { key, carry, total: carry * roll, roll, idx: clubOrder.indexOf(key) };
    })
    .filter(Boolean)
    .sort((a, b) => b.total - a.total);
}

// ── Validation ─────────────────────────────────────────────────────────────
function valid(shots, parValue) {
  for (let i = 1; i < shots.length; i++) {
    if (shots[i].total >= shots[i - 1].total) return false;
  }
  if (shots.length > 1 && shots.slice(1).some(s => s.key === 'driver')) return false;
  if (parValue === 5) {
    const longClubs = ['driver','fw3','fw5','fw7','u2','u3'];
    if (!longClubs.includes(shots[0].key)) return false;
  }
  if (parValue >= 4 && shots.length > 1) {
    for (let i = 1; i < shots.length; i++) {
      if (shots[i].idx > idx7) return false;
    }
  }
  return true;
}

// ── Scoring ────────────────────────────────────────────────────────────────
function categorize(dist) {
  if (dist < 110) return { type: 'Short',  target: 90  };
  if (dist < 150) return { type: 'Medium', target: 130 };
  return              { type: 'Long',   target: 170 };
}

function evaluate(shots, hole, parValue, driverTotal) {
  if (!valid(shots, parValue)) return null;
  const sum      = shots.reduce((s, x) => s + x.total, 0);
  const approach = hole - sum;
  if (approach <= 0)             return null;
  if (approach > hole * 0.95)    return null;
  if (approach >= driverTotal)   return null;  // approach can't need more than a driver
  const cat = categorize(approach);
  return { shots, approach, score: Math.abs(approach - cat.target), type: cat.type };
}

// ── Combinations ───────────────────────────────────────────────────────────
function generateCombinations(arr, n) {
  if (n === 1) return arr.map(x => [x]);
  const combos = [];
  for (let i = 0; i < arr.length; i++) {
    generateCombinations(arr.slice(i + 1), n - 1).forEach(tail => {
      combos.push([arr[i], ...tail]);
    });
  }
  return combos;
}

// ── Par 3 ──────────────────────────────────────────────────────────────────
function calcPar3(clubsList, hole) {
  let best = null;
  clubsList.forEach(c => {
    if (c.total >= hole) return;
    const diff = hole - c.total;
    if (!best || diff < best.diff) best = { club: c, diff };
  });
  return best;
}

// ── Main ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const saved = loadBag();
  buildClubUI(saved);

  if (saved) {
    if (saved.driver)     document.getElementById('driverCarry').value = saved.driver;
    if (saved.i7)         document.getElementById('i7Carry').value     = saved.i7;
    if (saved.pw)         document.getElementById('pwCarry').value     = saved.pw;
    if (saved.conditions) document.getElementById('conditions').value  = saved.conditions;
  }

  ['driverCarry','i7Carry','pwCarry'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      updateCarryLabels();
      saveBag();
    });
  });

  updateCarryLabels();

  // ── Calculate ─────────────────────────────────────────────────────────
  function calculate() {
    const output   = document.getElementById('output');
    const hole     = Number(document.getElementById('holeLength').value);
    const parValue = Number(document.getElementById('parSelect').value);
    const driver   = Number(document.getElementById('driverCarry').value);
    const i7       = Number(document.getElementById('i7Carry').value) || 0;
    const pw       = Number(document.getElementById('pwCarry').value) || 0;

    if (!hole || hole < 50)     { output.innerHTML = '<span class="error">Please enter a valid hole length.</span>'; return; }
    if (!driver || driver < 50) { output.innerHTML = '<span class="error">Please enter your driver carry distance.</span>'; return; }

    const clubsList = getClubs(driver, i7, pw);
    if (clubsList.length === 0) { output.innerHTML = '<span class="error">No clubs selected.</span>'; return; }

    // Driver total distance (carry + roll) — used as the approach ceiling
    const driverClub = clubsList.find(c => c.key === 'driver');
    const driverTotal = driverClub ? driverClub.total : driver * getRollFactor('driver');

    // ── Par 3 ──────────────────────────────────────────────────────────
    if (parValue === 3) {
      const result = calcPar3(clubsList, hole);
      if (!result) {
        output.innerHTML = '<span class="error">No selected club reaches within the hole length. Check carry inputs or selected clubs.</span>';
        return;
      }
      const s = result.club;
      const label = clubMap[s.key]?.label ?? s.key;
      const remaining = hole - s.total;
      const rollNote = s.roll > 1.00
        ? ` <span class="roll-note">(carry ${s.carry.toFixed(0)}m + ${(s.total - s.carry).toFixed(0)}m roll)</span>`
        : '';
      output.innerHTML =
        `<b>Par 3 — Tee shot is the approach:</b><br><br>` +
        `<b>${label}</b> — ${s.total.toFixed(0)}m${rollNote}<br>` +
        `&nbsp;&nbsp;↳ <b>Remaining to pin: ${remaining.toFixed(0)}m</b>`;
      return;
    }

    // ── Par 4 / 5 ──────────────────────────────────────────────────────
    const maxShots = parValue === 4 ? 2 : 3;
    const plans = [];

    for (let n = 1; n <= maxShots; n++) {
      generateCombinations(clubsList, n).forEach(combo => {
        const result = evaluate(combo, hole, parValue, driverTotal);
        if (result) plans.push(result);
      });
    }

    const best = {};
    plans.forEach(p => {
      if (!best[p.type] || p.score < best[p.type].score) best[p.type] = p;
    });

    const ordered = ['Long','Medium','Short'].map(t => best[t]).filter(Boolean);

    if (ordered.length === 0) {
      output.innerHTML = '<span class="error">No valid plans found. Check inputs or selected clubs.</span>';
      return;
    }

    // Tee clubs for the force selector: driver/FW/utilities in bag,
    // PLUS the natural tee club of each plan (so it's always possible to revert).
    // Deduplication happens when building per-plan dropdowns below.
    const TEE_KEYS = ['driver','fw3','fw5','fw7','u2','u3','u4'];
    const teeBase = clubsList.filter(c => TEE_KEYS.includes(c.key));

    // ── Render shots + approach into a container element ──────────────────
    function renderPlan(p, container) {
      container.innerHTML = '';
      p.shots.forEach((s, i) => {
        const lbl = clubMap[s.key]?.label ?? s.key;
        const rollNote = s.roll > 1.00
          ? ` <span class="roll-note">(carry ${s.carry.toFixed(0)}m + ${(s.total - s.carry).toFixed(0)}m roll)</span>`
          : ` <span class="roll-note">(carry = total)</span>`;
        const row = document.createElement('div');
        row.innerHTML = `Shot ${i + 1}: <b>${lbl}</b> — ${s.total.toFixed(0)}m${rollNote}`;
        container.appendChild(row);
      });
      const appDiv = document.createElement('div');
      appDiv.className = 'approach-line';
      appDiv.innerHTML = `&nbsp;&nbsp;↳ <b>Approach: ${p.approach.toFixed(0)}m</b>`;
      container.appendChild(appDiv);
    }

    // ── Find best plan with a specific tee club locked ────────────────────
    function solveForced(forcedTeeKey) {
      const teeClub = clubsList.find(c => c.key === forcedTeeKey);
      if (!teeClub) return null;
      const rest = clubsList.filter(c => c.total < teeClub.total && c.key !== 'driver');
      const forcedPlans = [];

      for (let n = 0; n < maxShots; n++) {
        if (n === 0) {
          const approach = hole - teeClub.total;
          if (approach > 0 && approach < driverTotal && approach <= hole * 0.95) {
            const cat = categorize(approach);
            forcedPlans.push({ shots: [teeClub], approach, score: Math.abs(approach - cat.target), type: cat.type });
          }
        } else {
          generateCombinations(rest, n).forEach(tail => {
            const combo = [teeClub, ...tail];
            let ok = true;
            for (let i = 1; i < combo.length; i++) {
              if (combo[i].total >= combo[i-1].total || combo[i].idx > idx7) { ok = false; break; }
            }
            if (!ok) return;
            const sum = combo.reduce((s, x) => s + x.total, 0);
            const approach = hole - sum;
            if (approach <= 0 || approach >= driverTotal || approach > hole * 0.95) return;
            const cat = categorize(approach);
            forcedPlans.push({ shots: combo, approach, score: Math.abs(approach - cat.target), type: cat.type });
          });
        }
      }
      return forcedPlans.length
        ? forcedPlans.reduce((b, p) => p.score < b.score ? p : b)
        : null;
    }

    // ── Build output DOM ──────────────────────────────────────────────────
    const condLabel = document.getElementById('conditions').value === 'firm' ? 'Firm' : 'Soft';
    output.innerHTML = '';

    const heading = document.createElement('div');
    heading.innerHTML = `<b>Plans by approach strategy</b> <span class="roll-note">(${condLabel} fairway)</span>`;
    output.appendChild(heading);

    ordered.forEach(p => {
      const block = document.createElement('div');
      block.className = 'plan-block';

      // Header
      const header = document.createElement('div');
      header.style.cssText = 'margin-top:10px; margin-bottom:4px;';
      header.innerHTML = `<b>${p.type} approach</b>`;
      block.appendChild(header);

      // Tee selector row — build per-plan options first, then decide whether to show
      const naturalTee = p.shots[0];
      const teeOptions = teeBase.some(c => c.key === naturalTee.key)
        ? teeBase
        : [...teeBase, naturalTee].sort((a, b) => b.total - a.total);

      if (teeOptions.length > 0) {
        const selectorRow = document.createElement('div');
        selectorRow.className = 'tee-selector-row';

        const selectorLabel = document.createElement('label');
        selectorLabel.textContent = 'Tee club:';
        selectorRow.appendChild(selectorLabel);

        const sel = document.createElement('select');
        teeOptions.forEach(tc => {
          const opt = document.createElement('option');
          opt.value = tc.key;
          opt.textContent = `${clubMap[tc.key].label} (${tc.total.toFixed(0)}m)`;
          if (tc.key === naturalTee.key) opt.selected = true;
          sel.appendChild(opt);
        });
        selectorRow.appendChild(sel);

        const forcedSpan = document.createElement('span');
        forcedSpan.className = 'forced-note';
        selectorRow.appendChild(forcedSpan);
        block.appendChild(selectorRow);

        // Content area
        const content = document.createElement('div');
        block.appendChild(content);
        renderPlan(p, content);

        sel.addEventListener('change', () => {
          const key = sel.value;
          if (key === naturalTee.key) {
            forcedSpan.textContent = '';
            renderPlan(p, content);
          } else {
            const forced = solveForced(key);
            if (!forced) {
              forcedSpan.textContent = '— no valid plan';
              content.innerHTML = '';
            } else {
              forcedSpan.textContent = '';
              renderPlan(forced, content);
            }
          }
        });
      } else {
        const content = document.createElement('div');
        block.appendChild(content);
        renderPlan(p, content);
      }

      output.appendChild(block);
    });
  }

  document.getElementById('calcButton').addEventListener('click', calculate);

  // Re-run instantly when conditions change, but only if a result is already shown
  document.getElementById('conditions').addEventListener('change', () => {
    updateCarryLabels();
    saveBag();
    const output = document.getElementById('output');
    if (output.querySelector('.plan-block, .error') || output.innerHTML.includes('Par 3')) {
      calculate();
    }
  });
});
</script>
</body>
</html>
